<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <h1>Review &amp; Place Your Order</h1>

      <div class="checkout-layout">
        <form id="checkout-form" name="checkout">
          <fieldset>
            <legend>Customer Information</legend>
            <label for="fname">First Name</label>
            <input
              id="fname"
              name="fname"
              type="text"
              autocomplete="given-name"
              required
            />

            <label for="lname">Last Name</label>
            <input
              id="lname"
              name="lname"
              type="text"
              autocomplete="family-name"
              required
            />
          </fieldset>

          <fieldset>
            <legend>Shipping Address</legend>
            <label for="street">Street Address</label>
            <input
              id="street"
              name="street"
              type="text"
              autocomplete="street-address"
              required
            />

            <label for="city">City</label>
            <input
              id="city"
              name="city"
              type="text"
              autocomplete="address-level2"
              required
            />

            <label for="state">State</label>
            <input
              id="state"
              name="state"
              type="text"
              autocomplete="address-level1"
              maxlength="2"
              pattern="[A-Za-z]{2}"
              title="Enter the two-letter state code"
              required
            />

            <label for="zip">Zip Code</label>
            <input
              id="zip"
              name="zip"
              type="text"
              autocomplete="postal-code"
              inputmode="numeric"
              pattern="[0-9]{5}"
              title="Enter a five-digit zip code"
              required
            />
          </fieldset>

          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Credit Card Number</label>
            <input
              id="cardNumber"
              name="cardNumber"
              type="text"
              autocomplete="cc-number"
              inputmode="numeric"
              pattern="[0-9]{16}"
              title="Enter a 16-digit card number"
              required
            />

            <label for="expiration">Expiration Date</label>
            <input
              id="expiration"
              name="expiration"
              type="text"
              autocomplete="cc-exp"
              placeholder="MM/YY"
              pattern="(0[1-9]|1[0-2])/[0-9]{2}"
              title="Enter the expiration date as MM/YY"
              required
            />

            <label for="code">Security Code</label>
            <input
              id="code"
              name="code"
              type="text"
              autocomplete="cc-csc"
              inputmode="numeric"
              pattern="[0-9]{3}"
              title="Enter the three-digit security code"
              required
            />
          </fieldset>

          <button id="checkoutSubmit" type="submit">Place Order</button>
        </form>

        <section class="order-summary" aria-labelledby="summary-title">
          <h2 id="summary-title">Order Summary</h2>
          <dl>
            <div>
              <dt>Items (<span id="num-items">0</span>)</dt>
              <dd id="subtotal">$0.00</dd>
            </div>
            <div>
              <dt>Tax</dt>
              <dd id="tax">$0.00</dd>
            </div>
            <div>
              <dt>Shipping</dt>
              <dd id="shipping">$0.00</dd>
            </div>
            <div class="order-total">
              <dt>Order Total</dt>
              <dd id="order-total">$0.00</dd>
            </div>
          </dl>
        </section>
      </div>
    </main>

    <footer id="main-footer">&copy;NOT a real business</footer>
  </body>
</html>
